<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Spliqo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F9FAFB;
            color: #111827;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
        }
        .logo-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: #10B981;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-text { font-size: 1.25rem; font-weight: 700; color: #111827; letter-spacing: -0.025em; }
        .icon { margin: 0 auto 1.5rem; width: 4rem; height: 4rem; color: #D1FAE5; }
        h1 { font-size: 1.5rem; font-weight: 700; color: #111827; margin-bottom: 0.5rem; }
        p  { font-size: 0.875rem; color: #6B7280; max-width: 24rem; line-height: 1.6; }
        a  {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.625rem 1.5rem;
            background: #10B981;
            color: #fff;
            border-radius: 0.75rem;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
        }
        a:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="logo">
        <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7z"/>
                <path d="M16 12a4 4 0 0 1-8 0"/>
            </svg>
        </div>
        <span class="logo-text">Spliqo</span>
    </div>

    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0z"/>
    </svg>

    <h1>You are offline</h1>
    <p>It looks like you lost your internet connection. Check your connection and try again.</p>
    <a href="javascript:window.location.reload()">Try again</a>
</body>
</html>
